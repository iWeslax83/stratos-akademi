name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  kontrol:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Tip kontrolü
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Testler
        run: npx vitest run

      # Build, Supabase env'i olmadan da geçmeli (sayfalar force-dynamic).
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ornek.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ornek-anon-key

      - name: Playwright tarayıcısı
        run: npx playwright install --with-deps chromium

      # e2e sahte Supabase env'iyle koşar: testler oturumsuz davranışı doğrular
      # (korumalı sayfalar /login'e gider, cron 401 döner) — gerçek veri gerekmez.
      - name: E2E
        run: npx playwright test
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ornek.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ornek-anon-key

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
