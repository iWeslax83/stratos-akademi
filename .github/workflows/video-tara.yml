name: Video Öneri Taraması

on:
  schedule:
    - cron: "0 6 */2 * *" # 2 günde bir 06:00 UTC
  workflow_dispatch: {}

jobs:
  tara:
    runs-on: ubuntu-latest
    steps:
      - name: Cron uç noktasını tetikle
        run: |
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/cron/video-tara")
          echo "HTTP $code"; cat /tmp/resp.json
          test "$code" = "200"
